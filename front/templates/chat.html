{% extends 'index.html' %}

{% block title %}
Chat
{% endblock %}

{% block content %}
<section>
    <div>
        {% for message in messages %}

        {% if message.sender == "Bot" %}
            {% set class_msg = "left" %}
        {% else %}
            {% set class_msg = "right" %}
        {% endif %}

            <div class="{{ class_msg }}">
                <p>
                    {{ message.content }}
                </p>
            </div>
        {% endfor %}
    </div>
    <div>
        <form action="" method="post">
            {% csrf_token %}
            <input type="text" name="content">
            <button type="submit">Enviar</button>
        </form>
    </div>
</section>
{% endblock %}
