{% extends 'index.html' %}

{% block title %}
Bem-vindo!
{% endblock %}

{% block content %}
<section>
    <form action="/" method="post">
        {% csrf_token %}
        <label for="username">
            Nome de usuário:
            <input type="text" name="username" placeholder="@seunomedeusuario" required>
        </label>
        <label for="password">
            Senha:
            <input type="password" name="password" required>
        </label>
        <button type="submit">Entrar</button>
    </form>
    {% if fail_login %}
        <p>Nome de usuário e/ou senha incorretos.</p>
    {% endif %}
</section>
{% endblock %}
